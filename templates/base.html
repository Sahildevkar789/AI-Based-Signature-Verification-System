<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignVerify</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
       /* ===== RESET & BASE ===== */
* {
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #f9fafb;
    color: #111827;
}

/* ===== NAVBAR ===== */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 80px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
}

nav h1 {
    font-size: 22px;
    font-weight: 700;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #374151;
    font-weight: 500;
}

nav a:hover {
    color: #2563eb;
}

/* ===== LAYOUT ===== */
.container {
    padding: 60px 80px;
}

.page {
    padding: 80px;
}

/* ===== CARD ===== */
.card {
    background: white;
    padding: 40px;
    border-radius: 16px;
    border: 1px solid #e5e7eb;
    margin-bottom: 40px;
}

.card.wide {
    max-width: 1000px;
    margin: auto;
    padding: 45px;
}

/* ===== TEXT ===== */
.subtitle {
    color: #6b7280;
    margin-bottom: 35px;
}

/* ===== BUTTON ===== */
.btn {
    display: inline-block;
    padding: 12px 24px;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
}

.btn:hover {
    background: #1e40af;
}

/* ===== PROCESS / HOW IT WORKS ===== */
.process {
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.process-step {
    display: flex;
    gap: 25px;
    align-items: flex-start;
}

.icon {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    flex-shrink: 0;
}

.icon.blue   { background: #2563eb; }
.icon.purple{ background: #7c3aed; }
.icon.green { background: #16a34a; }
.icon.orange{ background: #ea580c; }
.icon.red   { background: #dc2626; }

.process-step h4 {
    margin-bottom: 6px;
    font-size: 18px;
}

.process-step p {
    color: #4b5563;
    line-height: 1.6;
}

/* ===== IMAGES ===== */
img.responsive {
    max-width: 100%;
    border-radius: 12px;
    margin-top: 20px;
}

/* ===== FOOTER ===== */
footer {
    background: white;
    border-top: 1px solid #e5e7eb;
    padding: 25px;
    text-align: center;
    color: #6b7280;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {
    nav {
        padding: 20px 30px;
    }

    .container {
        padding: 40px 30px;
    }

    .page {
        padding: 60px 30px;
    }
}

@media (max-width: 768px) {
    .process-step {
        flex-direction: column;
    }
}
/* HELP PAGE */
.help-card {
    max-width: 900px;
}

.faq-accordion {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.faq-item {
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    overflow: hidden;
    background: #f9fafb;
}

.faq-question {
    width: 100%;
    background: white;
    border: none;
    padding: 18px 22px;
    font-size: 16px;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.faq-question i {
    transition: transform 0.3s ease;
}

.faq-answer {
    display: none;
    padding: 18px 22px;
    color: #4b5563;
    line-height: 1.6;
    background: #f9fafb;
}

.faq-item.active .faq-answer {
    display: block;
}

.faq-item.active .faq-question i {
    transform: rotate(180deg);
}

.help-cta {
    margin-top: 35px;
    text-align: center;
}
/* DEVELOPER SECTION */
.dev-section {
    margin-top: 60px;
}

.dev-card {
    display: grid;
    grid-template-columns: 1.3fr 0.7fr;
    gap: 40px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 18px;
    padding: 40px;
}

.dev-info h3 {
    margin-bottom: 12px;
}

.dev-info p {
    color: #4b5563;
    line-height: 1.6;
    margin-bottom: 18px;
}

.dev-info ul {
    list-style: none;
}

.dev-info li {
    margin-bottom: 8px;
    color: #374151;
}

.dev-info i {
    color: #2563eb;
    margin-right: 8px;
}

/* CONTACT */
.dev-contact h4 {
    margin-bottom: 10px;
}

.dev-contact p {
    color: #6b7280;
    margin-bottom: 20px;
}

.contact-btn {
    display: block;
    text-align: center;
    padding: 12px;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    margin-bottom: 12px;
}

.contact-btn:hover {
    background: #1e40af;
}

.contact-btn.outline {
    background: transparent;
    color: #2563eb;
    border: 1px solid #2563eb;
}

.contact-btn.outline:hover {
    background: #2563eb;
    color: white;
}

/* MOBILE */
@media (max-width: 768px) {
    .dev-card {
        grid-template-columns: 1fr;
    }
}

    </style>
</head>

<body>

<nav>
    <h1><i class="fa-solid fa-signature"></i> SignVerify</h1>
    <div>
        <a href="/">Home</a>
        <a href="/verify">Verify</a>
      
        <a href="/how">How It Works</a>
        <a href="/help">Help</a>
       
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    © 2026 SignVerify • AI-Based Signature Verification System
</footer>

</body>
</html>
