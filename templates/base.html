<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignVerify</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* ===== ADVANCED NAVBAR ===== */
        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        nav h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        nav a i {
            font-size: 1rem;
            color: var(--secondary);
        }

        nav a:hover {
            color: var(--primary);
            transform: translateY(-1px);
        }

        nav a:hover i {
            color: var(--primary);
        }

        /* ===== PREMIUM CARDS ===== */
        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.25rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border-radius: 0.75rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* ===== FORMS ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* ===== UTILS ===== */
        .text-center { text-align: center; }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; }

        /* ===== FOOTER ===== */
        footer {
            padding: 3rem;
            text-align: center;
            background: white;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            nav { padding: 1rem 2rem; flex-direction: column; gap: 1rem; }
            nav .nav-links { gap: 1rem; font-size: 0.8rem; }
        }
    </style>
</head>

<body>

<nav>
    <h1><i class="fa-solid fa-signature"></i> SignVerify</h1>
    <div class="nav-links">
        <a href="/"><i class="fa-solid fa-house"></i> Home</a>
        {% if current_user.is_authenticated %}
            <a href="/verify"><i class="fa-solid fa-square-check"></i> Verify</a>
            <a href="/manage"><i class="fa-solid fa-user-plus"></i> Manage</a>
            <a href="/history"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
            <a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        {% else %}
            <a href="/login"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
            <a href="/signup"><i class="fa-solid fa-user-pen"></i> Register</a>
        {% endif %}
        <a href="/how"><i class="fa-solid fa-circle-info"></i> How it Works</a>
        <a href="/help"><i class="fa-solid fa-circle-question"></i> Help</a>
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    © 2026 SignVerify • AI-Based Signature Verification System
</footer>

</body>
</html>
